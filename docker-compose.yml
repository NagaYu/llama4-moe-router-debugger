# ──────────────────────────────────────────────────────────────────────────
# One-command local stack: FastAPI backend + Streamlit dashboard.
#
#   docker compose up --build           # MOCK mode (no weights) by default
#   MOE_MOCK=0 MOE_MODEL_ID=meta-llama/Llama-4-Scout-17B-16E-Instruct \
#     docker compose up --build         # real model (needs GPU runtime)
#
# Dashboard:  http://localhost:8501
# API docs:   http://localhost:8000/docs
# ──────────────────────────────────────────────────────────────────────────
services:
  api:
    build:
      context: .
      # MOCK demo needs no torch; flip to "true" to bake in the full ML stack.
      args:
        INSTALL_ML: "${INSTALL_ML:-false}"
    image: llama4-moe-debugger:latest
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000
    environment:
      MOE_MOCK: "${MOE_MOCK:-1}"
      MOE_MODEL_ID: "${MOE_MODEL_ID:-meta-llama/Llama-4-Scout-17B-16E-Instruct}"
      MOE_DEVICE: "${MOE_DEVICE:-auto}"
      MOE_DTYPE: "${MOE_DTYPE:-bfloat16}"
      MOE_LOAD_4BIT: "${MOE_LOAD_4BIT:-0}"
    ports:
      - "8000:8000"
    volumes:
      # Persist the HF weight cache across runs (ignored in mock mode).
      - hf_cache:/cache/huggingface
    # For real-weight inference, uncomment to expose the host GPUs:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  dashboard:
    image: llama4-moe-debugger:latest
    command: >
      streamlit run src/app.py
      --server.port 8501 --server.address 0.0.0.0
    environment:
      # Inside the compose network the backend is reachable as "api".
      MOE_API_URL: "http://api:8000"
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  hf_cache:
