name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # The core test-suite is weight-free, so CI installs only the light
      # dependencies it actually needs — torch / transformers are NOT pulled,
      # keeping the pipeline fast (seconds, not minutes).
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest

      - name: Syntax check (all modules import-compile)
        run: python -m py_compile src/*.py tests/*.py conftest.py

      - name: Run tests (warnings promoted to errors)
        run: pytest -q -W error::RuntimeWarning

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image (no push, lightweight profile)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          build-args: INSTALL_ML=false
          tags: llama4-moe-debugger:ci
